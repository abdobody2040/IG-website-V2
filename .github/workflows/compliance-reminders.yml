name: Send Compliance Reminders

on:
  schedule:
    # Run at 09:00 UTC every day (matches bugs.md B-012 spec)
    - cron: '0 9 * * *'
  workflow_dispatch: # Allow manual triggering

jobs:
  send-reminders:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run compliance reminders script
        env:
          # PocketBase connection
          PB_URL: "${{ secrets.PB_URL }}"
          # Script reads PB_ADMIN_EMAIL / PB_ADMIN_PASS (not ADMIN_EMAIL / ADMIN_PASSWORD)
          PB_ADMIN_EMAIL: "${{ secrets.PB_ADMIN_EMAIL }}"
          PB_ADMIN_PASS: "${{ secrets.PB_ADMIN_PASS }}"
          # Email sending
          RESEND_API_KEY: "${{ secrets.RESEND_API_KEY }}"
          FROM_EMAIL: "${{ secrets.FROM_EMAIL }}"
          APP_URL: "${{ secrets.APP_URL }}"
        run: node scripts/send-compliance-reminders.mjs
