# fly.toml app configuration file generated for instantgrow-pocketbase
# Refer to https://fly.io/docs/reference/configuration/ for details.

app = "instantgrow-pocketbase"
primary_region = "cdg"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true       # ✅ HTTPS-only enforcement — Fly.io redirects all HTTP→HTTPS
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[mounts]
  source = "pb_data"
  destination = "/pb/pb_data"

[env]
  # ── Set all secrets via `fly secrets set` — NEVER hardcode values here ──────
  # Required secrets:
  #   fly secrets set PB_ENCRYPTION_KEY="$(openssl rand -hex 32)"
  #   fly secrets set STRIPE_SECRET_KEY="sk_live_..."
  #
  # PB_ENCRYPTION_KEY is read by start.sh and passed to --encryptionEnv flag.
  # MUST be set BEFORE first boot. Cannot be rotated after data exists.

